[mgr]
ratio = [0, 2, 6]

[opener]
edit = [
  { run = "nvim %s", block = true, for = "unix" }
]

[open]
prepend_rules = [
  { mime = "text/*", use = "edit" }
]

[plugin]
prepend_previewers = [
  { name = "*.md", run = 'piper -- bat --color=always --style=plain --paging=never --language=markdown "$1"' },
  { mime = "text/*", run = 'piper -- bat --color=always --style=plain --paging=never "$1"' }
]
